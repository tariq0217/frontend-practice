<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">

<body>
   <form action="submit.php" method="post">
     
     <p>
       <label for="email">Email:</label>
      <input type="email" id="email" name="email" required><br><br>
     </p>
     <p>
      <label for="age">Age:</label>
      <input type="number" id="age" name="age" min="18" max="99" required><br><br>
     </p>
     <p>
      <label for="dob">Date of Birth:</label>
      <input type="date" id="dob" name="dob" required>
     </p>
     <p>
      <label for="range">Price Range:</label>
      <input type="range" id="range" name="range " min="0" max="1000" step="50" value="500">
     </p>
     <p>
      <label for="web">Website:</label>
      <input type="url" id="web" name="web">
     </p>
     <p>
      <label for="time">Time:</label>
      <input type="time" id="time" name="time">
     </p><p>
      <label for="vweek">Which Week:</label>
      <input type="week" id="vweek" name="vweek">
     </p><p>
      <label for="search">Job Search:</label>
      <input type="search" id="search" name="search">
     </p>
      <p>
         <input type="submit" value="Submit">
      </p>
</body>
</html>
