<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Document</title>
</head>
<body>
   
   <h1>Job Application Form</h1>
   <form action="/submit" method="post" enctype="multipart/form-data">
   <p>
      <label for="name">Your Name:</label> <br>
      <input type="text" name="name" placeholder="Enter your name">
      
   </p>
   <p>
      Your Education: <br>
      <input type="radio" name="education" value="highschool" id="highschool"> <label for="highschool">High School</label> <br>
      <input type="radio" name="education" value="bachelor" id="bachelor"> <label for="bachelor">Bachelor Degree</label> <br>
      <input type="radio" name="education" value="master" id="master"> <label for="master">Master Degree</label> <br>
      <input type="radio" name="education" value="phd" id="phd"> <label for="phd">PhD</label>
   </p>

   <p>
      <label for="job">You Want To Apply For:</label> <br>
       
      <select name="job">
         <option value="webdev">Web Developer</option>
         <option value="appdev">App Developer</option>
         <option value="datascience">Data Science</option>
         <option value="ml">Machine Learning</option>
      </select>
      
   </p>

   <p>
      <label for="resume">Your Resume:</label> <br>
      <input type="file" name="resume">
      
   </p>
   <p>
      <button type="button" >Send Details</button>
   </p>

   </form> 

</body>
</html>
